<!DOCTYPE html>
<html lang='en' xnlns:th="http://www.w3.org/1999/xhtml">

<head>
	<meta charset = 'UTF-8'>
	<title>Login</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
	<main class="theme_user">
		<header class="cabecalho">
			<h1>Login</h1>
			<p>Log in to access the clinic's sistem.</p>
		</header>
		
		<section>
			<p th=if="${error}" th:text="${erro}" class="erro"></p>
			
			<form action="/login" method="post" class="formolario">
				<label for="email">Email</label>
				<input type="email" id="email" name="email" placeholder="Your Email." required>
				
				<label for="sehna">Password</label>
				<input type="email" id="senha" name="senha" placeholder="Password" required>
				<button type="submit">Log In</button>
			</form>
			<p>Don't have an account?</p>
			<a href="/registar">Sign Up!</p>
		</section>
		
	</main>
	<script src="/js/script.js"></script>
</body>
